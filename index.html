<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        iframe {
            border: none;
        }
    </style>
</head>

<body>
    <iframe id="player" src="https://www.youtube.com/embed/X7PpIndMbPg?autoplay=1&loop=1&mute=1&playlist=X7PpIndMbPg"
        width="100%" height="100%" allow="autoplay; encrypted-media" allowfullscreen>
    </iframe>

    <script>
        document.addEventListener("click", function () {
            const iframe = document.getElementById("player");
            iframe.contentWindow.postMessage(
                '{"event":"command","func":"unMute","args":""}',
                "*"
            );
        });
    </script>
